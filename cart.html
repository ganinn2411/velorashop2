<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELORA – Sepetim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Sepet sayfasına özel header ── */
    .cart-header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: var(--header-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 40px;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      transition: background 0.3s;
    }

    .cart-header .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text);
      text-decoration: none;
    }

    .cart-header-right {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    /* Ürün sayısı badge */
    .cart-item-count {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="cart-header">
  <a href="index.html" class="logo">VELORA</a>

  <div class="cart-header-right">
    <span class="cart-item-count" id="header-item-count"></span>
    <!-- Dark Mode Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Karanlık Mod">🌙</button>
    <a href="index.html" class="back-home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Ana Sayfa
    </a>
  </div>
</header>

<!-- SEPET İÇERİĞİ -->
<div class="cart-page">
  <h1>Sepetim</h1>
  <div id="cart-items"></div>

  <div class="cart-footer">
    <h2>Toplam: <span id="total">0</span> TL</h2>
    <button class="checkout" onclick="sendWhatsApp()">ÖDEMEYE GEÇ</button>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Header'daki ürün sayısını güncelle
  function updateHeaderCount() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const total = cart.reduce((s, i) => s + (i.quantity || 0), 0);
    const el = document.getElementById("header-item-count");
    if (el) el.textContent = total > 0 ? `${total} ürün` : "";
  }
  updateHeaderCount();
</script>
</body>
</html>
